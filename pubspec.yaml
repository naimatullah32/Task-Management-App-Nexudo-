name: task_management
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  smooth_page_indicator: ^1.1.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  fluttertoast: ^9.0.0
  cached_network_image: ^3.4.1
  another_flushbar: ^1.12.32
  equatable: ^2.0.8
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.2
  get_it: ^9.2.1
  google_sign_in: ^6.2.1
  lottie: ^3.3.2
  connectivity_plus: ^6.0.3
  internet_connection_checker: ^1.0.0+1
  curved_navigation_bar: ^1.0.6
  iconly: ^1.0.1
  font_awesome_flutter: ^11.0.0
  iconsax: ^0.0.8
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  image_picker: ^1.0.4
  flutter_neumorphic_plus: ^3.5.0
  intl: ^0.20.2
  formz: ^0.6.0
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_launcher_icons: ^0.13.1
  supabase_flutter: ^2.5.6 # 🔥 FIX 1: Dev dependencies se utha kar asli dependencies mein daal diya hai

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0
#  flutter_native_splash: ^2.4.0 # 🔥 FIX 2: Package version ko clean kar ke yahan rakha hai

# 🔥 FIX 3: Configuration block ko root level (bilkul margin ke sath) nikal diya hai
#flutter_native_splash:
#  color: "#0D0E1A"
#  fullscreen: true
#
#  android_12:
#    color: "#0D0E1A"

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo.png" # 🔥 Yahan apni file ka exact path dein
  min_sdk_android: 21 # Ye latest Android requirements ke liye zaroori hai
  remove_alpha_ios: true # Apple icons mein transparency allow nahi karta, ye usay fix karega



flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/success.json




